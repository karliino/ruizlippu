name: Liputon Ruisrock monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every ~10 min (GitHub may delay it a little)
  workflow_dispatch: {}        # lets you run it manually to test

permissions:
  contents: write              # so it can save state.json between runs

concurrency:
  group: liputon-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

          # ---- EDIT THESE TWO ----
          LIPUTON_URL: "https://www.liputon.fi/events/110487"
          MAX_PRICE:   "230"
          # If you use the bargains page above, uncomment the next line.
          # If LIPUTON_URL points at the Ruisrock-specific page, leave it out.
          # EVENT_KEYWORD: "ruisrock"
        run: python monitor.py

      - name: Save state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "ticket-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update seen listings [skip ci]"
            git push
          fi
